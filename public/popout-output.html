<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rerender output</title>
    <style>
      :root {
        --void: #020505;
        --panel: #071111;
        --line: #1e4548;
        --cyan: #6ee7f2;
        --lime: #a8ff3e;
        --text: #dff8f7;
        --muted: #7ea9ad;
        --font-mono: "SFMono-Regular", "Roboto Mono", "Cascadia Code", ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        background: var(--void);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background:
          linear-gradient(rgba(110, 231, 242, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(110, 231, 242, 0.03) 1px, transparent 1px),
          #020404;
        background-size: 12px 12px;
        display: grid;
        grid-template-rows: 42px minmax(0, 1fr);
      }

      header {
        align-items: center;
        background:
          linear-gradient(90deg, rgba(110, 231, 242, 0.12), rgba(7, 16, 17, 0.92) 52%),
          rgba(5, 13, 14, 0.95);
        border-bottom: 1px solid rgba(110, 231, 242, 0.24);
        display: flex;
        justify-content: space-between;
        padding: 0 14px;
      }

      strong,
      span {
        font-family: var(--font-mono);
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      strong {
        color: #d4f7f8;
        font-size: 12px;
      }

      span {
        border: 1px solid currentColor;
        color: var(--lime);
        font-size: 9px;
        padding: 2px 6px;
      }

      main {
        border: 1px solid rgba(110, 231, 242, 0.38);
        border-top: 0;
        box-shadow:
          inset 0 0 0 1px rgba(0, 0, 0, 0.85),
          inset 10px 0 0 rgba(110, 231, 242, 0.055),
          inset -20px 0 0 rgba(110, 231, 242, 0.08);
        min-height: 0;
        overflow: hidden;
        position: relative;
      }

      main::before,
      main::after {
        content: "";
        pointer-events: none;
        position: absolute;
        z-index: 2;
      }

      main::before {
        background:
          repeating-linear-gradient(
            0deg,
            rgba(110, 231, 242, 0.28) 0 18px,
            transparent 18px 30px
          );
        bottom: 10px;
        opacity: 0.58;
        right: 8px;
        top: 0;
        width: 12px;
      }

      main::after {
        background:
          repeating-linear-gradient(
            90deg,
            rgba(110, 231, 242, 0.22) 0 58px,
            transparent 58px 70px
          );
        bottom: 8px;
        height: 12px;
        left: 24px;
        opacity: 0.5;
        right: 26px;
      }

      video {
        background: #020404;
        height: 100%;
        object-fit: contain;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>SANA output</strong>
      <span>Detached</span>
    </header>
    <main>
      <video id="sana-output-video" autoplay muted playsinline></video>
    </main>
  </body>
</html>
